name: Data report
description: 데이터 출처, 권리, 개인정보 또는 무결성 문제를 보고합니다.
title: "[data] "
body:
  - type: input
    id: files
    attributes:
      label: 대상 파일 또는 경로
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: 원 출처와 권리자
    validations:
      required: true
  - type: textarea
    id: terms
    attributes:
      label: 라이선스·이용 조건
      description: 원문 링크와 확인 일자를 포함해 주세요.
    validations:
      required: true
  - type: dropdown
    id: redistribution
    attributes:
      label: 재배포 가능 여부
      options:
        - 확인되지 않음
        - 가능
        - 조건부 가능
        - 불가
    validations:
      required: true
  - type: dropdown
    id: sensitive
    attributes:
      label: 개인정보·민감정보 포함 가능성
      options:
        - 없음
        - 있음
        - 확인 필요
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: 문제와 제안 조치
    validations:
      required: true

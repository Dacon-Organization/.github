name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-versions:
        description: JSON 배열 형식의 Python 버전
        required: false
        type: string
        default: '["3.11"]'
      working-directory:
        description: 테스트 명령을 실행할 저장소 내 디렉터리
        required: false
        type: string
        default: "."
      requirements-file:
        description: 저장소 루트 기준 requirements 파일
        required: false
        type: string
        default: requirements.txt
      test-command:
        description: working-directory에서 실행할 테스트 명령
        required: false
        type: string
        default: python -m pytest -q
      notebook-command:
        description: 선택적 Notebook 검증 명령
        required: false
        type: string
        default: ""
      run-ruff:
        description: Ruff lint 실행 여부
        required: false
        type: boolean
        default: true
      run-ruff-format:
        description: Ruff format check 실행 여부
        required: false
        type: boolean
        default: true
      timeout-minutes:
        required: false
        type: number
        default: 30
      artifact-retention-days:
        required: false
        type: number
        default: 7

permissions:
  contents: read

jobs:
  lint:
    name: lint
    if: ${{ inputs.run-ruff }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Ruff lint
        id: ruff-lint
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          args: check --output-format=github
          src: ${{ inputs.working-directory }}
          version: 0.15.20
          download-from-astral-mirror: "false"

      - name: Ruff format
        id: ruff-format
        if: ${{ inputs.run-ruff-format }}
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          args: format --check
          src: ${{ inputs.working-directory }}
          version: 0.15.20
          download-from-astral-mirror: "false"

      - name: 실패 메타데이터 기록
        if: ${{ failure() }}
        shell: bash
        env:
          LINT_OUTCOME: ${{ steps.ruff-lint.outcome }}
          FORMAT_OUTCOME: ${{ steps.ruff-format.outcome }}
        run: |
          mkdir -p "$RUNNER_TEMP/ci-logs"
          {
            echo "ruff-lint=$LINT_OUTCOME"
            echo "ruff-format=$FORMAT_OUTCOME"
          } > "$RUNNER_TEMP/ci-logs/ruff.txt"

      - name: 실패 artifact 업로드
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-logs
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifact-retention-days }}

  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: requirements 존재 확인
        shell: bash
        env:
          REQUIREMENTS_FILE: ${{ github.workspace }}/${{ inputs.requirements-file }}
        run: test -f "$REQUIREMENTS_FILE"

      - name: Python 설정
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ${{ inputs.requirements-file }}

      - name: 의존성 설치
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        env:
          REQUIREMENTS_FILE: ${{ github.workspace }}/${{ inputs.requirements-file }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          mkdir -p "$RUNNER_TEMP/ci-logs"
          set -o pipefail
          python -m pip install --requirement "$REQUIREMENTS_FILE" \
            2>&1 | tee "$RUNNER_TEMP/ci-logs/install-$PYTHON_VERSION.log"

      - name: 테스트
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          TEST_COMMAND: ${{ inputs.test-command }}
        run: |
          set -o pipefail
          bash -euo pipefail -c "$TEST_COMMAND" \
            2>&1 | tee "$RUNNER_TEMP/ci-logs/test-$PYTHON_VERSION.log"

      - name: 실패 환경 기록
        if: ${{ failure() }}
        shell: bash
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          mkdir -p "$RUNNER_TEMP/ci-logs"
          python -m pip freeze \
            > "$RUNNER_TEMP/ci-logs/pip-freeze-$PYTHON_VERSION.txt" || true

      - name: 실패 artifact 업로드
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-${{ matrix.python-version }}-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-logs
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifact-retention-days }}

  notebook:
    name: notebook
    if: ${{ inputs.notebook-command != '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Python 설정
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ inputs.requirements-file }}

      - name: 의존성 설치
        shell: bash
        env:
          REQUIREMENTS_FILE: ${{ github.workspace }}/${{ inputs.requirements-file }}
        run: python -m pip install --requirement "$REQUIREMENTS_FILE"

      - name: Notebook 검증
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        env:
          NOTEBOOK_COMMAND: ${{ inputs.notebook-command }}
        run: |
          mkdir -p "$RUNNER_TEMP/ci-logs"
          set -o pipefail
          bash -euo pipefail -c "$NOTEBOOK_COMMAND" \
            2>&1 | tee "$RUNNER_TEMP/ci-logs/notebook.log"

      - name: 실패 artifact 업로드
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: notebook-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-logs
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifact-retention-days }}

  gate:
    name: gate
    if: ${{ always() }}
    needs: [lint, test, notebook]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: 결과 집계
        shell: bash
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          NOTEBOOK_RESULT: ${{ needs.notebook.result }}
        run: |
          test "$LINT_RESULT" = "success" -o "$LINT_RESULT" = "skipped"
          test "$TEST_RESULT" = "success"
          test "$NOTEBOOK_RESULT" = "success" -o "$NOTEBOOK_RESULT" = "skipped"

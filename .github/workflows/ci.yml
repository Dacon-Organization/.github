name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: 정적 정책 검사
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: uv 설정
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true

      - name: 자산 구조와 SHA pin 검증
        run: uv run --with PyYAML==6.0.3 python scripts/validate_assets.py

      - name: Actionlint 설치와 무결성 확인
        shell: bash
        env:
          ACTIONLINT_URL: https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error \
            --location "$ACTIONLINT_URL" --output "$RUNNER_TEMP/actionlint.tar.gz"
          echo "$ACTIONLINT_SHA256  $RUNNER_TEMP/actionlint.tar.gz" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/actionlint.tar.gz" \
            --directory "$RUNNER_TEMP" actionlint

      - name: GitHub Actions 의미 검증
        run: |
          "$RUNNER_TEMP/actionlint" -color \
            .github/workflows/*.yml workflow-templates/*.yml

      - name: GitHub Actions 보안 정적 분석
        run: uvx --from zizmor==1.26.1 zizmor --min-severity medium .github/workflows

  docs:
    name: 문서
    uses: ./.github/workflows/reusable-docs-ci.yml
    permissions:
      contents: read

  policy:
    name: PR 정책
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/reusable-pr-policy.yml
    permissions: {}

  dependency-review:
    name: 의존성 검토
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/reusable-dependency-review.yml
    permissions:
      contents: read

  ci-gate:
    name: CI / gate
    if: ${{ always() }}
    needs: [static, docs]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: 결과 집계
        shell: bash
        env:
          STATIC_RESULT: ${{ needs.static.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
        run: |
          test "$STATIC_RESULT" = "success"
          test "$DOCS_RESULT" = "success"

  policy-gate:
    name: PR Policy / gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [policy]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: 결과 집계
        shell: bash
        env:
          POLICY_RESULT: ${{ needs.policy.result }}
        run: test "$POLICY_RESULT" = "success"

  dependency-review-gate:
    name: Dependency Review / gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [dependency-review]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: 결과 집계
        shell: bash
        env:
          DEPENDENCY_RESULT: ${{ needs.dependency-review.result }}
        run: test "$DEPENDENCY_RESULT" = "success"
